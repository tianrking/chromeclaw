<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChromeClaw Side Panel</title>
  <link rel="stylesheet" href="ui-theme.css" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <main class="chat-app">
    <header class="topbar">
      <div class="brand">
        <h1>ChromeClaw Chat</h1>
        <span class="brand-sub">Page-aware browser agent</span>
      </div>
      <span id="status" class="status-pill">Idle</span>
      <div class="top-actions">
        <button id="newChat" class="ghost">New Chat</button>
        <button id="autoApproveToggle" class="ghost">Auto Approve: OFF</button>
        <button id="openOptions" class="ghost">Options</button>
      </div>
    </header>

    <section class="global-state" aria-label="Global status">
      <div class="state-item">
        <span class="state-label">mode</span>
        <span id="stateMode" class="state-value">-</span>
      </div>
      <div class="state-item">
        <span class="state-label">strategy</span>
        <span id="stateStrategy" class="state-value">generic</span>
      </div>
      <div class="state-item">
        <span class="state-label">approval</span>
        <span id="stateApproval" class="state-value">-</span>
      </div>
      <div class="state-item state-task">
        <span class="state-label">task</span>
        <span id="stateTask" class="state-value">Idle</span>
      </div>
    </section>

    <select id="sessionSelect" class="hidden" title="Conversation session"></select>

    <section id="chatFeed" class="chat-feed" aria-label="Conversation"></section>

    <details class="panel approvals-panel">
      <summary id="approvalSummary">Action Approval (0)</summary>
      <div id="approvals" class="approvals">No pending approvals.</div>
    </details>

    <details class="panel debug-panel">
      <summary>Debug Trace</summary>
      <pre id="trace"></pre>
    </details>

    <footer class="composer">
      <textarea id="goal" placeholder="Describe your goal..."></textarea>
      <div class="composer-actions">
        <button id="run">Send</button>
      </div>
    </footer>

    <pre id="result" class="hidden"></pre>
  </main>

  <script src="popup.js"></script>
</body>
</html>
